services:
  backend:
    container_name: backend
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  frontend:
    container_name: frontend
    build:
      context: ./Frontend/desafio-wa
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
